@if (isOpen()) {
  <!-- eslint-disable-next-line @angular-eslint/template/interactive-supports-focus, @angular-eslint/template/click-events-have-key-events -->
  <div class="fixed inset-0 z-40 flex items-center justify-center p-4 backdrop-overlay bg-slate-900/60 dark:bg-slate-950/85 backdrop-blur-sm animate-fade-in"
       (click)="onBackdropClick($event)">
    
    <div [class]="'w-full flex flex-col bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 animate-zoom-in ' + getSizeClass()"
         role="dialog" 
         aria-modal="true">
      
      <!-- Header -->
      @if (title()) {
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
          <h3 class="text-lg font-semibold text-slate-900 dark:text-white">
            {{ title() }}
          </h3>
       <button type="button" 
                   (click)="dismiss.emit()"
                  class="rounded-lg p-1.5 text-slate-400 hover:text-slate-650 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer"
                  aria-label="Close">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      }
 
      <!-- Body -->
      <div class="flex-grow p-6 overflow-y-auto max-h-[75vh]">
        <ng-content></ng-content>
      </div>
 
      <!-- Footer -->
      @if (hasFooter()) {
        <div class="flex items-center justify-end gap-3 px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800">
          <ng-content select="[footer]"></ng-content>
        </div>
      }
 
    </div>
  </div>
}
